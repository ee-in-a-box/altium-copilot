name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  validate-changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate CHANGELOG has release notes
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          if ! grep -q "## \[$VERSION\]" CHANGELOG.md; then
            echo "::error::No release notes found in CHANGELOG.md for version $VERSION"
            echo "Add a section like '## [$VERSION] - $(date +%Y-%m-%d)' to CHANGELOG.md"
            exit 1
          fi
          echo "Found release notes for version $VERSION"

  test:
    needs: validate-changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-ruff ruff

      - name: Lint
        run: ruff check server/ tests/

      - name: Test
        run: pytest

  build:
    needs: test
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install -r requirements.txt pyinstaller

      - name: Extract version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract release notes from CHANGELOG
        id: changelog
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk -v ver="$VERSION" '
            /^## \[/ { if (found) exit; if ($0 ~ "\\[" ver "\\]") found=1; next }
            /^\[.*\]:/ { exit }
            found { print }
          ' CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update manifest version
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" manifest.json

      - name: Build binary
        run: |
          pyinstaller `
            --onefile `
            --name altium-copilot `
            --distpath server/dist `
            --workpath build `
            --add-data "server/scripts;scripts" `
            --add-data "manifest.json;." `
            --paths server `
            server/main.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "v${{ steps.version.outputs.version }}"
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            server/dist/altium-copilot.exe
