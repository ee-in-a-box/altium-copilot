name: Feature request
description: Suggest something new
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the workflow or pain point.
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: What did you try?
      description: How are you working around it today?
    validations:
      required: false
